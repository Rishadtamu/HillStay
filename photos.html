<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HillStay - Add Photos</title>
    <link rel="stylesheet" href="css/hillstay.css">
    <link rel="stylesheet" href="css/https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Header -->
    <header class="main-header">
        

        <!-- Main Navigation Tier -->
        <div class="header-main-tier">
            <a href="index.html" class="logo">
                <img src="images/hillstay_logo.jpeg" alt="HillStay Logo" class="logo-img"> HillStay
            </a>

            <div class="header-nav-desktop">
                <a href="experience.html" class="nav-item">Explore</a>
                <a href="homestay.html" class="nav-item">Stays</a>
                <a href="experience.html" class="nav-item">Experiences</a>
                <a href="destination.html" class="nav-item">Destinations</a>
                <a href="about.html" class="nav-item">Guides</a>
            </div>

            <div class="header-main-right">
                <button class="search-icon-btn" aria-label="Search" onclick="window.location.href='index.html#search'"><i class="fa-solid fa-magnifying-glass"></i></button>
                <div class="header-lang-switcher">
                    <i class="fa-solid fa-globe"></i>
                    <div class="lang-dropdown">
                        <span class="lang-opt" data-lang="en">EN</span>
                        <span class="lang-opt" data-lang="hi">HI</span>
                        <span class="lang-opt" data-lang="bn">BN</span>
                        <span class="lang-opt" data-lang="ne">NE</span>
                    </div>
                </div>
                <div class="header-actions">
                    <!-- Auth Icon -->
                </div>
                <!-- Mobile Menu Toggle -->
                <button class="menu-toggle" aria-label="Toggle navigation">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </div>

        <!-- Navigation Links (Sidebar for Mobile) -->
        </div>
    </header>

    <div style="max-width: 800px; margin: 4rem auto; padding: 0 2rem; min-height: 60vh; text-align: center;">
        <h1 style="color: var(--primary); margin-bottom: 1rem;">Share Your Memories</h1>
        <p style="color: var(--text-muted); margin-bottom: 3rem;">Help other travelers see the beauty you've discovered.
        </p>

        <div style="border: 3px dashed #ddd; padding: 5rem; border-radius: 20px; background: #fafafa; cursor: pointer;">
            <i class="fa-solid fa-cloud-arrow-up" style="font-size: 4rem; color: #ccc; margin-bottom: 1rem;"></i>
            <h3>Drag & Drop Photos Here</h3>
            <p style="color: #999;">or click to browse your files</p>
        </div>
    </div>

    <footer class="main-footer">
        <div style="text-align: center; padding: 2rem 0; border-top: 1px solid #333;">
            <p>&copy; 2026 HillStay LLC. All rights reserved.</p>
        </div>
    </footer>
</body>

</html>
